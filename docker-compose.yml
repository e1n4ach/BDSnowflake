services:
  postgres:
    image: postgres:16
    container_name: bdsnowflake-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: petstore_dw
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d:ro
      - ./исходные данные:/source-data:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d petstore_dw"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
